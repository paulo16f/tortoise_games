# Depthbreaker local/dev stack (design doc §9).
#   docker compose up postgres          -> DB only (backend via npm run dev)
#   docker compose up                   -> DB + backend + nginx
# TLS: put cert.pem/key.pem in ./certs (see certs/README.md) before starting nginx.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: depthbreaker
      POSTGRES_PASSWORD: depthbreaker
      POSTGRES_DB: depthbreaker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U depthbreaker"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    image: node:22-alpine
    working_dir: /repo/games/depthbreaker/backend
    # tsx dev runtime; migrations apply on boot (server.ts main()).
    command: sh -c "npm ci && npm run start"
    environment:
      NODE_ENV: development
      PORT: "3100"
      DATABASE_URL: postgres://depthbreaker:depthbreaker@postgres:5432/depthbreaker
      SESSION_SECRET: ${SESSION_SECRET:-dev-session-secret-change-me}
      ZONE_SHARED_SECRET: ${ZONE_SHARED_SECRET:-dev-zone-shared-secret-change-me}
      ZONE_WS_URL: ${ZONE_WS_URL:-ws://localhost:2667}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5184}
    volumes:
      # Mount the repo root: backend imports ../../../../shared/lib/config.ts.
      - ../../..:/repo
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3100"

  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      # Unity WebGL build output goes here (unity/Build -> served at /).
      - ../unity/Build:/usr/share/nginx/webgl:ro
    depends_on:
      - backend

  # Headless Unity zone server — enable once a Linux Dedicated Server image
  # exists (unity/SETUP.md). Until then, run the zone server from the Unity
  # editor or a local build and point ZONE_WS_URL at it.
  #zone:
  #  image: depthbreaker/zone-server:dev   # built from the Unity Linux build
  #  environment:
  #    ZONE_PORT: "7770"
  #    ZONE_ID: hub
  #    BACKEND_URL: http://backend:3100
  #    ZONE_SHARED_SECRET: ${ZONE_SHARED_SECRET:-dev-zone-shared-secret-change-me}
  #  expose:
  #    - "7770"

volumes:
  pgdata:
