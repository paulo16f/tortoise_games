# Depthbreaker edge (design doc §3, §9): TLS termination for BOTH https (API,
# static WebGL) and wss (game traffic). Bayou runs plain ws behind this proxy
# (decision D3) — the browser only ever sees wss://host/game.
# /internal/* is deliberately NOT routed: only zone servers may call it,
# directly on the backend network.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;

    # Unity WebGL compressed artifacts (Brotli/gzip pre-compressed by Unity).
    types {
        application/wasm wasm;
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        # --- REST API -> backend ---
        location /api/ {
            proxy_pass http://backend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # --- Game WebSocket -> Bayou (plain ws inside the network) ---
        location /game {
            proxy_pass http://zone:7770;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Long-lived game connections; don't let idle timeouts kill them.
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # --- Static Unity WebGL build ---
        location / {
            root /usr/share/nginx/webgl;
            index index.html;

            # Serve Unity's pre-compressed files with correct encoding headers.
            location ~ \.br$ {
                add_header Content-Encoding br;
                types {
                    application/octet-stream br;
                }
                # Real content types for Unity loader files:
                location ~ \.wasm\.br$  { default_type application/wasm;       add_header Content-Encoding br; }
                location ~ \.js\.br$    { default_type application/javascript; add_header Content-Encoding br; }
                location ~ \.data\.br$  { default_type application/octet-stream; add_header Content-Encoding br; }
            }
            location ~ \.gz$ {
                add_header Content-Encoding gzip;
                location ~ \.wasm\.gz$  { default_type application/wasm;       add_header Content-Encoding gzip; }
                location ~ \.js\.gz$    { default_type application/javascript; add_header Content-Encoding gzip; }
                location ~ \.data\.gz$  { default_type application/octet-stream; add_header Content-Encoding gzip; }
            }
        }
    }
}
